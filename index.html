<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>❣️Төрсөн өдрийн мэнд❣️</title>
    <link rel="icon" href="zvrx.jpng.webp">
</head>
<body>
<div style="display:flex; flex-direction:column; align-items:center; width:100%; text-align:center;">
    <div id="particles"></div>
    <div id="conf-wrap"></div>
    <div id="soliut-container"></div>

    <div style="margin-top: 60px;"></div>
    <div class="header-deco">
        <div class="header-line"></div>
        <span class="header-gem">✦</span>
        <div class="header-line r"></div>
    </div>
    <h1>🎉Чиний төрсөн өдөр хүртэлх хугацаа 🎉</h1>
    <div style="margin-top: 16px;"><h2>Цаг нь дуусхаар нээгээрэй</h2></div>
    <div style="margin-bottom: 30px;"><h3>--------------------</h3></div>

    <div id="countdown">
        <div class="time-block">
            <div class="time" id="days">00</div>
            <div class="time-label">өдөр</div>
        </div>
        <div class="sep">·</div>
        <div class="time-block">
            <div class="time" id="hours">00</div>
            <div class="time-label">цаг</div>
        </div>
        <div class="sep">·</div>
        <div class="time-block">
            <div class="time" id="minutes">00</div>
            <div class="time-label">минут</div>
        </div>
        <div class="sep">·</div>
        <div class="time-block">
            <div class="time" id="seconds">00</div>
            <div class="time-label">секунд</div>
        </div>
    </div>

    <input type="checkbox" id="play">
    <label for="play" class="play-btn">🎂 &nbsp;Нээх</label>

    <audio loop>
        <source src="hbd.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <div class="candle">
            <input type="checkbox" id="switch">
            <label for="switch">
                <div class="flame"></div>
                <div class="smoke"></div>
            </label>
        </div>
        <div class="cake">
            <div class="top-layer"></div>
            <div class="middle-layer"></div>
            <div class="bottom-layer"></div>
            <h2>❣️Төрсөн өдрийн мэнд хүргэе❣️</h2>
            <h2>❣️Лаагаа үлээгээрэй (дар)❣️</h2>
        </div>
        <a href="page2/page2.html" id="nextBtn" class="next-btn" style="display:none;">
            ✨ Үргэлжлүүлэх ✨
        </a>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
